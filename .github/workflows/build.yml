name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android || true

      - name: Add exact alarm permission
        run: |
          sed -i '/<application/i\    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\n    <uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE" />' android/app/src/main/AndroidManifest.xml

      - name: Add rest timer service declaration
        run: |
          sed -i '/<\/application>/i\    <service\n        android:name=".RestTimerService"\n        android:exported="false"\n        android:foregroundServiceType="specialUse">\n        <property\n            android:name="android.app.PROPERTY_SPECIAL_USE_FGS_SUBTYPE"\n            android:value="rest_timer_countdown" />\n    </service>' android/app/src/main/AndroidManifest.xml

      - name: Copy native rest notification files
        run: |
          mkdir -p android/app/src/main/java/com/esdras/saiyajinfit
          cp resources/native/RestNotificationPlugin.java android/app/src/main/java/com/esdras/saiyajinfit/RestNotificationPlugin.java
          cp resources/native/RestTimerService.java android/app/src/main/java/com/esdras/saiyajinfit/RestTimerService.java
          cp resources/native/MainActivity.java android/app/src/main/java/com/esdras/saiyajinfit/MainActivity.java
          cp resources/native/BatteryOptimizationPlugin.java android/app/src/main/java/com/esdras/saiyajinfit/BatteryOptimizationPlugin.java

      - name: Generate app icons
        run: npx @capacitor/assets generate --android --iconBackgroundColor '#0f0f0f' --iconBackgroundColorDark '#0f0f0f'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
