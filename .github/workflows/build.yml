name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android || true

      - name: Add exact alarm permission
        run: |
          sed -i '/<application/i\    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\n    <uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS" />' android/app/src/main/AndroidManifest.xml

      - name: Copy native rest notification files
        run: |
          mkdir -p android/app/src/main/java/com/esdras/saiyajinfit
          cp resources/native/RestNotificationPlugin.java android/app/src/main/java/com/esdras/saiyajinfit/RestNotificationPlugin.java
          cp resources/native/MainActivity.java android/app/src/main/java/com/esdras/saiyajinfit/MainActivity.java
          cp resources/native/BatteryOptimizationPlugin.java android/app/src/main/java/com/esdras/saiyajinfit/BatteryOptimizationPlugin.java

      - name: Generate app icons
        run: npx @capacitor/assets generate --android
